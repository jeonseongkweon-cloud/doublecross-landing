<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>문의 | DOUBLE CROSS</title>
  <meta name="description" content="문의/신청" />

  <!-- =========================
       ✅ CHANGE ZONE (여기만 수정!)
       ========================= -->
  <script>
    const CONFIG = {
      brand: "DOUBLE CROSS",
      pageKey: "apply",
      pageTitle: "문의",
      phone: "010-4477-2772",
      email: "help@doublecross.kr",                 // 없으면 ""
      kakaoChatLink: "https://open.kakao.com/o/gPxTAxhi",
      bandLink: "https://www.band.us/n/a4a2b4Y8gaIfb",
      links: {
        home: "/index.html",
        check: "/check/index.html",
        gallery: "/gallery/index.html",
        about: "/about/index.html",
        apply: "/apply/index.html",
        library: "/library/index.html"
      }
    };
  </script>

  <style>
    :root{
      --bg:#0b0f19; --panel:rgba(18,28,51,.72); --panel2:rgba(15,22,40,.78);
      --line:rgba(36,52,90,.65); --text:#e9eefc; --muted:#a9b6d6;
      --accent:#ff7a18; --r:18px; --shadow:0 18px 60px rgba(0,0,0,.55);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(1200px 800px at 50% -220px, rgba(255,122,24,.16), transparent 55%),
        radial-gradient(900px 600px at 20% 0%, rgba(80,120,255,.12), transparent 55%),
        var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans KR",sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    a{color:inherit;text-decoration:none}
    .wrap{max-width:980px;margin:0 auto;padding:16px 14px 30px}

    .topbar{
      display:flex;align-items:center;gap:10px;
      background:rgba(18,28,51,.65);
      border:1px solid rgba(36,52,90,.60);
      padding:12px 12px;border-radius:22px;
      backdrop-filter: blur(8px);
      box-shadow:var(--shadow);
    }
    .brand{font-weight:1000;display:flex;align-items:center;gap:10px;min-width:0}
    .mark{
      width:34px;height:34px;border-radius:12px;
      border:1px solid rgba(255,122,24,.35);
      background:rgba(255,122,24,.08);
      display:flex;align-items:center;justify-content:center;
      font-weight:1000;color:rgba(255,122,24,.95);
      flex:0 0 auto;
    }
    .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .badge{
      margin-left:auto;font-size:12px;color:var(--muted);
      border:1px solid rgba(36,52,90,.70);
      padding:7px 10px;border-radius:999px;background:rgba(15,22,40,.70);
      white-space:nowrap;
    }
    .nav{
      margin-top:12px;
      display:grid; grid-template-columns:repeat(5, minmax(0,1fr)); gap:8px;
    }
    .nav a{
      text-align:center;padding:10px 8px;border-radius:14px;
      background:rgba(15,22,40,.65);
      border:1px solid rgba(36,52,90,.55);
      color:var(--muted);font-weight:900;font-size:13px;user-select:none;
    }
    .nav a.active{
      color:var(--text);
      border-color:rgba(255,122,24,.55);
      box-shadow:0 0 0 1px rgba(255,122,24,.15) inset;
    }

    .hero{
      margin-top:14px;padding:18px;border-radius:22px;
      background:linear-gradient(180deg, rgba(18,28,51,.85), rgba(15,22,40,.65));
      border:1px solid rgba(36,52,90,.65);
      box-shadow:var(--shadow);
    }
    h1{margin:0 0 8px;font-size:22px;font-weight:1000}
    .sub{margin:0 0 14px;color:var(--muted);line-height:1.6}

    label{display:block;font-size:13px;color:var(--muted);margin:10px 0 6px}
    input, textarea{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(36,52,90,.8);
      background:rgba(15,22,40,.85);
      color:var(--text);
      outline:none;
    }
    textarea{min-height:120px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:720px){ .row{grid-template-columns:1fr 1fr;} }

    .cta{
      margin-top:12px;
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    @media(min-width:720px){ .cta{grid-template-columns:1.2fr .8fr;} }
    .btn{
      padding:13px 14px;border-radius:14px;
      border:1px solid rgba(255,122,24,.55);
      background:linear-gradient(180deg, rgba(255,122,24,.95), rgba(255,122,24,.75));
      color:#111;font-weight:1000;text-align:center;user-select:none;
    }
    .btn2{
      padding:13px 14px;border-radius:14px;
      border:1px solid rgba(36,52,90,.75);
      background:rgba(15,22,40,.85);
      color:var(--text);font-weight:1000;text-align:center;user-select:none;
    }
    .quick{
      margin-top:12px;
      display:grid;grid-template-columns:1fr;gap:10px;
    }
    @media(min-width:720px){ .quick{grid-template-columns:repeat(3,1fr);} }
    .q{
      padding:12px;border-radius:18px;
      background:rgba(15,22,40,.75);
      border:1px solid rgba(36,52,90,.6);
      text-align:center;font-weight:900;
      user-select:none;
    }
    footer{margin-top:16px;color:rgba(233,238,252,.45);font-size:12px;text-align:center}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" id="homeLink" href="/index.html">
        <span class="mark">DC</span>
        <span class="name" id="brandName">DOUBLE CROSS</span>
      </a>
      <div class="badge" id="pageBadge">문의</div>
    </div>

    <div class="nav" id="nav"></div>

    <section class="hero">
      <h1>문의/신청</h1>
      <p class="sub">간단히 내용을 남기면 카카오/전화/이메일로 빠르게 안내합니다.</p>

      <div class="row">
        <div>
          <label>성함</label>
          <input id="name" placeholder="예: 홍길동" />
        </div>
        <div>
          <label>연락처</label>
          <input id="phone" placeholder="예: 010-1234-5678" />
        </div>
      </div>

      <label>이메일(선택)</label>
      <input id="email" placeholder="예: example@email.com" />

      <label>문의 내용</label>
      <textarea id="msg" placeholder="도장명, 지역, 희망 일정 등을 적어주세요."></textarea>

      <div class="cta">
        <div class="btn" onclick="sendKakao()">카카오로 문의 보내기</div>
        <div class="btn2" onclick="callNow()">전화 연결</div>
      </div>

      <div class="quick">
        <a class="q" id="kakaoLink" href="#" target="_blank" rel="noopener">카카오</a>
        <a class="q" id="bandLink" href="#" target="_blank" rel="noopener">밴드</a>
        <a class="q" id="mailLink" href="#" target="_blank" rel="noopener">이메일</a>
      </div>

      <footer>© <span id="year"></span> DOUBLE CROSS. All rights reserved.</footer>
    </section>
  </div>

<script>
  // header
  document.getElementById("brandName").textContent = CONFIG.brand;
  document.getElementById("pageBadge").textContent = CONFIG.pageTitle;
  document.getElementById("homeLink").href = CONFIG.links.home;
  document.getElementById("year").textContent = new Date().getFullYear();

  // nav
  const nav = document.getElementById("nav");
  const items = [
    {k:"check", t:"조회"},
    {k:"gallery", t:"갤러리"},
    {k:"about", t:"소개"},
    {k:"apply", t:"문의"},
    {k:"library", t:"자료실"},
  ];
  items.forEach(it=>{
    const a = document.createElement("a");
    a.href = CONFIG.links[it.k];
    a.textContent = it.t;
    if(it.k === CONFIG.pageKey) a.classList.add("active");
    nav.appendChild(a);
  });

  // quick links
  document.getElementById("kakaoLink").href = CONFIG.kakaoChatLink || "#";
  document.getElementById("bandLink").href = CONFIG.bandLink || "#";
  document.getElementById("mailLink").href = CONFIG.email ? `mailto:${CONFIG.email}` : "#";

  function callNow(){
    location.href = `tel:${(CONFIG.phone||"").replaceAll("-","")}`;
  }

  function sendKakao(){
    const n = document.getElementById("name").value.trim();
    const p = document.getElementById("phone").value.trim();
    const e = document.getElementById("email").value.trim();
    const m = document.getElementById("msg").value.trim();

    const text =
`[DOUBLE CROSS 문의/신청]
성함: ${n||"-"}
연락처: ${p||"-"}
이메일: ${e||"-"}
내용: ${m||"-"}`;

    // 내용 복사 후 카카오 열기(정책상 자동전송 불가)
    navigator.clipboard?.writeText(text);
    if(CONFIG.kakaoChatLink){
      window.open(CONFIG.kakaoChatLink, "_blank", "noopener");
      alert("문의 내용이 복사되었습니다. 열린 카카오톡 대화창에 붙여넣어 보내주세요!");
    }else{
      alert("카카오 링크가 설정되지 않았습니다. 내용이 복사되었습니다. 카카오톡에 붙여넣어 보내주세요!");
    }
  }
</script>
</body>
</html>
