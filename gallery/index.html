<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>갤러리 | DOUBLE CROSS</title>
  <meta name="description" content="DOUBLE CROSS 갤러리/영상" />

  <!-- =========================
       ✅ CHANGE ZONE (여기만 수정!)
       ========================= -->
  <script>
    const CONFIG = {
      brand: "DOUBLE CROSS",
      pageTitle: "갤러리",
      youtubeChannel: "https://www.youtube.com/channel/UChUhSc6TbNhvdLVrtNOTQhQ",
      // 대표 영상(유튜브) ID만 넣으면 됨
      featuredYoutubeId: "y_uqYZEU9uw",
      // 이미지 URL들 (없으면 빈 배열 [])
      images: [
        // "https://static.wixstatic.com/media/....png",
      ],
      links: {
        check: "/check/index.html",
        gallery: "/gallery/index.html",
        about: "/about/index.html",
        apply: "/apply/index.html",
        library: "/library/index.html",
        home: "/index.html"
      }
    };
  </script>

  <style>
    :root{
      --bg:#0b0f19; --panel:#0f1628; --card:#121c33; --line:#24345a;
      --text:#e9eefc; --muted:#a9b6d6; --accent:#ff7a18; --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(1200px 800px at 50% -200px, rgba(255,122,24,.16), transparent 55%),
                 radial-gradient(900px 600px at 20% 0%, rgba(80,120,255,.12), transparent 55%),
                 var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans KR",sans-serif;
    }
    a{color:inherit;text-decoration:none}
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 30px}
    .topbar{
      display:flex;align-items:center;gap:10px;
      background:rgba(18,28,51,.65);
      border:1px solid rgba(36,52,90,.6);
      padding:12px 12px;border-radius:22px;
      backdrop-filter: blur(8px);
    }
    .brand{font-weight:900;letter-spacing:.4px}
    .badge{
      margin-left:auto;font-size:12px;color:var(--muted);
      border:1px solid rgba(36,52,90,.7);
      padding:7px 10px;border-radius:999px;
      background:rgba(15,22,40,.7);
      white-space:nowrap;
    }
    .nav{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(5, minmax(0,1fr));
      gap:8px;
    }
    .nav a{
      text-align:center;
      padding:10px 8px;
      border-radius:14px;
      background:rgba(15,22,40,.65);
      border:1px solid rgba(36,52,90,.55);
      color:var(--muted);
      font-weight:700;
      font-size:13px;
    }
    .nav a.active{
      color:var(--text);
      border-color:rgba(255,122,24,.55);
      box-shadow:0 0 0 1px rgba(255,122,24,.15) inset;
    }
    .hero{
      margin-top:16px;
      padding:16px;border-radius:22px;
      background:linear-gradient(180deg, rgba(18,28,51,.85), rgba(15,22,40,.65));
      border:1px solid rgba(36,52,90,.65);
    }
    h1{margin:0 0 8px;font-size:22px;font-weight:900}
    .sub{margin:0 0 14px;color:var(--muted);line-height:1.6}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:860px){ .grid{grid-template-columns:1.2fr .8fr;} }
    .card{
      padding:14px;border-radius:22px;
      background:rgba(18,28,51,.72);
      border:1px solid rgba(36,52,90,.65);
    }
    .video{
      width:100%;
      aspect-ratio:16/9;
      border:1px solid rgba(36,52,90,.6);
      border-radius:16px;
      overflow:hidden;
      background:#000;
    }
    iframe{width:100%;height:100%;border:0}
    .btn{
      display:block;
      margin-top:12px;
      padding:13px 14px;border-radius:14px;
      border:1px solid rgba(255,122,24,.55);
      background:linear-gradient(180deg, rgba(255,122,24,.95), rgba(255,122,24,.75));
      color:#111;font-weight:900;text-align:center;
    }
    .imggrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    @media(min-width:860px){ .imggrid{grid-template-columns:repeat(2,1fr);} }
    .ph{
      width:100%;aspect-ratio:4/3;
      border-radius:16px;overflow:hidden;
      border:1px solid rgba(36,52,90,.55);
      background:rgba(15,22,40,.8);
      display:flex;align-items:center;justify-content:center;
      color:rgba(233,238,252,.5);
      font-weight:800;font-size:12px;
    }
    .ph img{width:100%;height:100%;object-fit:cover;display:block}
    footer{margin-top:18px;color:rgba(233,238,252,.45);font-size:12px;text-align:center}
  </style>
</head>

<body>
<div class="wrap">
  <div class="topbar">
    <a class="brand" id="brand" href="/index.html">DOUBLE CROSS</a>
    <div class="badge" id="badge">갤러리</div>
  </div>

  <div class="nav" id="nav"></div>

  <section class="hero">
    <h1>갤러리 & 영상</h1>
    <p class="sub">대표 영상과 이미지 모음입니다. (이미지는 Wix에 올린 URL을 그대로 붙여넣으면 됩니다.)</p>

    <div class="grid">
      <div class="card">
        <div class="video">
          <iframe id="yt" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
        <a class="btn" id="ytCh" href="#" target="_blank" rel="noopener">유튜브 채널 바로가기</a>
      </div>

      <div class="card">
        <div class="imggrid" id="imgGrid"></div>
      </div>
    </div>

    <footer>© <span id="year"></span> DOUBLE CROSS. All rights reserved.</footer>
  </section>
</div>

<script>
  document.getElementById("brand").textContent = CONFIG.brand;
  document.getElementById("badge").textContent = CONFIG.pageTitle;
  document.getElementById("year").textContent = new Date().getFullYear();

  // nav
  const nav = document.getElementById("nav");
  const items = [
    {k:"check", t:"조회"},
    {k:"gallery", t:"갤러리", active:true},
    {k:"about", t:"소개"},
    {k:"apply", t:"문의"},
    {k:"library", t:"자료실"},
  ];
  items.forEach(it=>{
    const a = document.createElement("a");
    a.href = CONFIG.links[it.k];
    a.textContent = it.t;
    if(it.active) a.classList.add("active");
    nav.appendChild(a);
  });

  // youtube
  const yt = document.getElementById("yt");
  yt.src = `https://www.youtube.com/embed/${CONFIG.featuredYoutubeId}`;
  const ytCh = document.getElementById("ytCh");
  ytCh.href = CONFIG.youtubeChannel;

  // images
  const grid = document.getElementById("imgGrid");
  if(!CONFIG.images || CONFIG.images.length===0){
    for(let i=0;i<4;i++){
      const d=document.createElement("div");
      d.className="ph";
      d.textContent="이미지 URL을 추가하세요";
      grid.appendChild(d);
    }
  }else{
    CONFIG.images.slice(0,8).forEach(url=>{
      const d=document.createElement("div");
      d.className="ph";
      const img=document.createElement("img");
      img.src=url;
      img.alt="gallery";
      d.appendChild(img);
      grid.appendChild(d);
    });
  }
</script>
</body>
</html>
