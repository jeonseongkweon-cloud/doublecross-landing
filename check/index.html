<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>조회 | DOUBLE CROSS</title>
  <meta name="description" content="공식 지정도장/지도자 조회" />

  <!-- =========================
       ✅ CHANGE ZONE (여기만 수정!)
       ========================= -->
  <script>
    const CONFIG = {
      brand: "DOUBLE CROSS",
      pageKey: "check",               // check | gallery | about | apply | library
      pageTitle: "조회",
      noticeTitle: "공식 확인/조회",
      noticeDesc: "공식 지정도장 및 지도자 확인을 위한 페이지입니다. (추후 데이터 기반 검색으로 고도화 예정)",
      // 필요시 외부 링크 추가(선택)
      kakaoLink: "https://open.kakao.com/o/gPxTAxhi",
      links: {
        home: "/index.html",
        check: "/check/index.html",
        gallery: "/gallery/index.html",
        about: "/about/index.html",
        apply: "/apply/index.html",
        library: "/library/index.html"
      }
    };
  </script>

  <style>
    :root{
      --bg:#0b0f19;
      --panel:rgba(18,28,51,.72);
      --panel2:rgba(15,22,40,.78);
      --line:rgba(36,52,90,.65);
      --text:#e9eefc;
      --muted:#a9b6d6;
      --accent:#ff7a18;
      --r:18px;
      --shadow:0 18px 60px rgba(0,0,0,.55);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(1200px 800px at 50% -220px, rgba(255,122,24,.16), transparent 55%),
        radial-gradient(900px 600px at 20% 0%, rgba(80,120,255,.12), transparent 55%),
        var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans KR",sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    a{color:inherit;text-decoration:none}
    .wrap{max-width:980px;margin:0 auto;padding:16px 14px 30px}

    /* ✅ 공통 상단바 */
    .topbar{
      display:flex;align-items:center;gap:10px;
      background:rgba(18,28,51,.65);
      border:1px solid rgba(36,52,90,.60);
      padding:12px 12px;
      border-radius:22px;
      backdrop-filter: blur(8px);
      box-shadow:var(--shadow);
    }
    .brand{
      font-weight:1000; letter-spacing:.4px;
      display:flex; align-items:center; gap:10px;
      min-width:0;
    }
    .brand .mark{
      width:34px;height:34px;border-radius:12px;
      border:1px solid rgba(255,122,24,.35);
      background:rgba(255,122,24,.08);
      display:flex;align-items:center;justify-content:center;
      font-weight:1000;color:rgba(255,122,24,.95);
      flex:0 0 auto;
    }
    .brand .name{
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .badge{
      margin-left:auto;
      font-size:12px;
      color:var(--muted);
      border:1px solid rgba(36,52,90,.70);
      padding:7px 10px;border-radius:999px;
      background:rgba(15,22,40,.70);
      white-space:nowrap;
    }

    .nav{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(5, minmax(0,1fr));
      gap:8px;
    }
    .nav a{
      text-align:center;
      padding:10px 8px;
      border-radius:14px;
      background:rgba(15,22,40,.65);
      border:1px solid rgba(36,52,90,.55);
      color:var(--muted);
      font-weight:900;
      font-size:13px;
      user-select:none;
    }
    .nav a.active{
      color:var(--text);
      border-color:rgba(255,122,24,.55);
      box-shadow:0 0 0 1px rgba(255,122,24,.15) inset;
    }

    /* ✅ 페이지 카드 */
    .hero{
      margin-top:14px;
      padding:18px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(18,28,51,.85), rgba(15,22,40,.65));
      border:1px solid rgba(36,52,90,.65);
      box-shadow:var(--shadow);
    }
    h1{margin:0 0 8px;font-size:22px;font-weight:1000}
    .sub{margin:0 0 14px;color:var(--muted);line-height:1.6}

    .card{
      margin-top:12px;
      padding:16px;border-radius:22px;
      background:rgba(18,28,51,.72);
      border:1px solid rgba(36,52,90,.65);
    }
    .btn{
      display:block;
      padding:13px 14px;border-radius:14px;
      border:1px solid rgba(255,122,24,.55);
      background:linear-gradient(180deg, rgba(255,122,24,.95), rgba(255,122,24,.75));
      color:#111;
      font-weight:1000;
      text-align:center;
      user-select:none;
    }
    .btn2{
      display:block;margin-top:10px;
      padding:13px 14px;border-radius:14px;
      border:1px solid rgba(36,52,90,.75);
      background:rgba(15,22,40,.85);
      color:var(--text);
      font-weight:1000;
      text-align:center;
      user-select:none;
    }
    footer{margin-top:16px;color:rgba(233,238,252,.45);font-size:12px;text-align:center}
  </style>
</head>

<body>
  <div class="wrap">
    <!-- ✅ 공통 상단바 -->
    <div class="topbar">
      <a class="brand" id="homeLink" href="/index.html">
        <span class="mark">DC</span>
        <span class="name" id="brandName">DOUBLE CROSS</span>
      </a>
      <div class="badge" id="pageBadge">조회</div>
    </div>

    <!-- ✅ 공통 메뉴 -->
    <div class="nav" id="nav"></div>

    <!-- ✅ 본문 -->
    <section class="hero">
      <h1 id="title">공식 확인/조회</h1>
      <p class="sub" id="desc"></p>

      <div class="card">
        <a class="btn" href="/apply/index.html">문의/신청하기</a>
        <a class="btn2" id="kakaoBtn" href="#" target="_blank" rel="noopener">카카오로 문의</a>
      </div>

      <footer>© <span id="year"></span> DOUBLE CROSS. All rights reserved.</footer>
    </section>
  </div>

<script>
  // header
  document.getElementById("brandName").textContent = CONFIG.brand;
  document.getElementById("pageBadge").textContent = CONFIG.pageTitle;
  document.getElementById("homeLink").href = CONFIG.links.home;
  document.getElementById("year").textContent = new Date().getFullYear();

  // nav
  const nav = document.getElementById("nav");
  const items = [
    {k:"check", t:"조회"},
    {k:"gallery", t:"갤러리"},
    {k:"about", t:"소개"},
    {k:"apply", t:"문의"},
    {k:"library", t:"자료실"},
  ];
  items.forEach(it=>{
    const a = document.createElement("a");
    a.href = CONFIG.links[it.k];
    a.textContent = it.t;
    if(it.k === CONFIG.pageKey) a.classList.add("active");
    nav.appendChild(a);
  });

  // content
  document.getElementById("title").textContent = CONFIG.noticeTitle;
  document.getElementById("desc").textContent = CONFIG.noticeDesc;

  // kakao
  const kb = document.getElementById("kakaoBtn");
  if(CONFIG.kakaoLink){
    kb.href = CONFIG.kakaoLink;
  }else{
    kb.href = "/apply/index.html";
    kb.removeAttribute("target");
  }
</script>
</body>
</html>
